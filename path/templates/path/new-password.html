<!doctype html>
<html>
    <head>
        {% load static %}
        <title>Passwords | New Password</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="{% static 'libraries/materialize.css' %}">
        <script src="{% static 'libraries/materialize.js' %}"></script>
    </head>
    <body>
        <div class="navbar-fixed">
            <nav class="black">
                <div class="nav-wrapper">
                    <a class="brand-logo center">New Password</a>
                </div>
            </nav>
        </div>
        <div class="container">
            <form method="POST" class="col s12">
                {% csrf_token %}
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="site" placeholder="Site" required autofocus autocomplete="off">
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="password" placeholder="Password" required autocomplete="off">
                    </div>
                </div>
                <div class="row">
                    <button type="submit" class="btn waves-effect waves-lighten black col s12">Create New Password</button>
                </div>
            </form>
        </div>
    </body>
</html>
